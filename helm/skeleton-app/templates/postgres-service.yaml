apiVersion: v1
kind: Service
metadata:
  name: {{ include "skeleton-app.fullname" . }}-postgres
  labels:
    app: {{ include "skeleton-app.fullname" . }}-postgres
spec:
  type: ClusterIP
  selector:
    app: {{ include "skeleton-app.fullname" . }}-postgres
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
      protocol: TCP
      name: postgres
