apiVersion: v1
kind: Service
metadata:
  name: {{ include "skeleton-app.fullname" . }}-backend
  labels:
    app: {{ include "skeleton-app.fullname" . }}-backend
spec:
  type: ClusterIP
  selector:
    app: {{ include "skeleton-app.fullname" . }}-backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      name: http
