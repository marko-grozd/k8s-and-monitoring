---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: skeleton
data:
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  REDIS_URL: "redis://redis-service:6379"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: skeleton
  labels:
    app: backend
spec:
  replicas: 2    # 2 replike - pokazuje horizontalno skaliranje
  selector:
    matchLabels:
      app: backend
  # Rolling update strategija - nula downtime deploy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1         # Maksimalno 1 extra Pod tokom deploya
      maxUnavailable: 0   # Nula nedostupnih Podova tokom deploya
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: k8s-skeleton-backend:latest  # Zameni sa tvojim registry
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          # Env iz ConfigMap-a
          envFrom:
            - configMapRef:
                name: backend-config
          # Env iz Secret-a
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Readiness - k8s ceka da backend bude spreman pre nego posalje traffic
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          # Liveness - k8s restartuje Pod ako zakuca
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: skeleton
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
