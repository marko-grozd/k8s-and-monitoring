apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: skeleton
type: Opaque
# NAPOMENA: U produkciji koristiti sealed-secrets ili external-secrets operator
# Ove vrednosti su base64 enkodovane:
#   echo -n "postgres" | base64  ->  cG9zdGdyZXM=
#   echo -n "appdb"    | base64  ->  YXBwZGI=
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: appdb
  DATABASE_URL: postgresql://postgres:postgres@postgres-service:5432/appdb
