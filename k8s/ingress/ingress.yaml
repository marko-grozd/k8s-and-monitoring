apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skeleton-ingress
  namespace: skeleton
  annotations:
    # Za nginx ingress controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  # ingressClassName: nginx  # Odkomentarisi ako imas nginx ingress controller
  rules:
    - host: skeleton.local   # Dodaj u /etc/hosts: 127.0.0.1 skeleton.local
      http:
        paths:
          # Frontend - root path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          # Backend API - /api/* rute
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Backend health
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
