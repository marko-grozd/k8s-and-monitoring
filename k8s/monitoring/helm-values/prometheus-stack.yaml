grafana:
  adminPassword: admin123
  livenessProbe:
    initialDelaySeconds: 300
    timeoutSeconds: 30
    failureThreshold: 10
  readinessProbe:
    initialDelaySeconds: 120
    timeoutSeconds: 30
    failureThreshold: 10
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

prometheus:
  prometheusSpec:
    retention: 24h
    additionalScrapeConfigs:
      - job_name: "backend-direct"
        static_configs:
          - targets: ["backend-service.skeleton.svc.cluster.local:8000"]
        metrics_path: /metrics
        scrape_interval: 15s

alertmanager:
  enabled: false